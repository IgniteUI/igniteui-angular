    <div class="header-actions">
        <igx-select
            class="locale-select"
            type="box"
            [(ngModel)]="locale"
            (selectionChanging)="updateLocale($event)">

            @for(item of selectLocales; track item) {
                <igx-select-item [value]="item">
                    {{ item }}
                </igx-select-item>
            }
        </igx-select>

        <igx-select
            class="size-select"
            type="box"
            [ngModel]="selectedSize()"
            (selectionChanging)="updateSize($event)">

            @for(size of sizeOptions; track size) {
                <igx-select-item [value]="size">
                    {{ size }}
                </igx-select-item>
            }
        </igx-select>

        <button
            (click)="onToggleDirectionClick()"
            igxButton="outlined"
            igxRipple
            [igxRippleCentered]="true"
            class="toggle-button" style="--ig-size: 2">


            @if(dirMode() === 'ltr') {
                <igx-icon>format_textdirection_l_to_r</igx-icon>
                <span>LTR</span>
            } @else {
                <igx-icon>format_textdirection_r_to_l</igx-icon>
                <span>RTL</span>
            }
        </button>

        @if(config) {
            <button
                igxIconButton="flat"
                igxRipple
                [igxRippleCentered]="true"
                igxToggleAction="paneldrawer"
                class="toggle-button">
                <igx-icon>settings</igx-icon>
            </button>
        }
    </div>
</igx-navbar>
