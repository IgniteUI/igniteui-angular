version: "1"

defaults:
  agent: gemini
  provider: docker
  trials: 5
  timeout: 300
  threshold: 0.8
  docker:
    base: node:20-slim

tasks:
  - name: create-contact-form-with-igniteui
    instruction: |
      Create an Angular component that uses Ignite UI for Angular form controls to build a contact form. The form should include:
      - Input Group for name and email fields
      - Date Picker for preferred contact date
      - Select dropdown for contact reason (Support, Sales, General)
      - Checkbox for newsletter subscription
      - Submit button using igx-button
      
      Make sure to properly configure the Angular app with required providers and imports. Save the main component file as contact-form.component.ts and the template as contact-form.component.html.
    graders:
      - type: deterministic
        run: |
          passed=0
          total=4
          c1_pass=false; c1_msg="Component file not found"
          c2_pass=false; c2_msg="Template file not found"
          c3_pass=false; c3_msg="Required Ignite UI imports not found"
          c4_pass=false; c4_msg="Form controls not properly implemented"

          if [ -f "contact-form.component.ts" ]; then
            passed=$((passed + 1))
            c1_pass=true; c1_msg="Component file exists"
          fi

          if [ -f "contact-form.component.html" ]; then
            passed=$((passed + 1))
            c2_pass=true; c2_msg="Template file exists"
          fi

          if [ -f "contact-form.component.ts" ] && grep -q "igniteui-angular" contact-form.component.ts && grep -q "IgxInputGroupModule\|IgxDatePickerModule\|IgxSelectModule\|IgxCheckboxModule\|IgxButtonModule" contact-form.component.ts; then
            passed=$((passed + 1))
            c3_pass=true; c3_msg="Required Ignite UI imports found"
          fi

          if [ -f "contact-form.component.html" ] && grep -q "igx-input-group\|igxInput" contact-form.component.html && grep -q "igx-date-picker\|igxDatePicker" contact-form.component.html && grep -q "igx-select\|igxSelect" contact-form.component.html && grep -q "igx-checkbox\|igxCheckbox" contact-form.component.html; then
            passed=$((passed + 1))
            c4_pass=true; c4_msg="Form controls properly implemented in template"
          fi

          score=$(awk "BEGIN {printf \"%.2f\", $passed/$total}")
          echo "{\"score\":$score,\"details\":\"$passed/$total checks passed\",\"checks\":[{\"name\":\"component_file\",\"passed\":$c1_pass,\"message\":\"$c1_msg\"},{\"name\":\"template_file\",\"passed\":$c2_pass,\"message\":\"$c2_msg\"},{\"name\":\"igniteui_imports\",\"passed\":$c3_pass,\"message\":\"$c3_msg\"},{\"name\":\"form_controls\",\"passed\":$c4_pass,\"message\":\"$c4_msg\"}]}"
        weight: 0.7
      - type: llm_rubric
        rubric: |
          Evaluate the contact form implementation:
          
          1. **Proper Ignite UI Setup (25%)**: 
             - Uses correct import paths from igniteui-angular
             - Includes necessary module imports
             - Follows the skill's protocol of reading reference files
          
          2. **Form Controls Implementation (35%)**:
             - Input Group properly configured for text inputs
             - Date Picker correctly implemented
             - Select dropdown with appropriate options
             - Checkbox for newsletter subscription
             - All controls use proper Ignite UI syntax
          
          3. **Code Quality (25%)**:
             - Clean, readable TypeScript code
             - Proper Angular component structure
             - Appropriate use of reactive or template-driven forms
             - Good HTML template organization
          
          4. **Completeness (15%)**:
             - All requested form elements present
             - Submit button implemented with igx-button
             - Basic form validation considerations
        weight: 0.3

  - name: create-dashboard-with-layout-and-charts
    instruction: |
      Create an Angular dashboard component using Ignite UI for Angular that includes:
      - Tab navigation with 3 tabs: "Overview", "Analytics", "Reports"
      - A card component in the Overview tab with summary information
      - A column chart in the Analytics tab showing sample sales data
      - A progress indicator and list component in the Reports tab
      
      Include proper app configuration and save the component as dashboard.component.ts and template as dashboard.component.html.
    graders:
      - type: deterministic
        run: |
          passed=0
          total=5
          c1_pass=false; c1_msg="Component file not found"
          c2_pass=false; c2_msg="Template file not found"
          c3_pass=false; c3_msg="Tab navigation not implemented"
          c4_pass=false; c4_msg="Chart component not found"
          c5_pass=false; c5_msg="Card and list components not implemented"

          if [ -f "dashboard.component.ts" ]; then
            passed=$((passed + 1))
            c1_pass=true; c1_msg="Component file exists"
          fi

          if [ -f "dashboard.component.html" ]; then
            passed=$((passed + 1))
            c2_pass=true; c2_msg="Template file exists"
          fi

          if [ -f "dashboard.component.html" ] && grep -q "igx-tabs\|igx-tab" dashboard.component.html; then
            passed=$((passed + 1))
            c3_pass=true; c3_msg="Tab navigation implemented"
          fi

          if [ -f "dashboard.component.ts" ] && grep -q "IgxColumnChartComponent\|igx-column-chart\|IgxCategoryChartComponent\|igx-category-chart" dashboard.component.ts dashboard.component.html 2>/dev/null; then
            passed=$((passed + 1))
            c4_pass=true; c4_msg="Chart component found"
          fi

          if [ -f "dashboard.component.html" ] && grep -q "igx-card\|igxCard" dashboard.component.html && grep -q "igx-list\|igxList" dashboard.component.html; then
            passed=$((passed + 1))
            c5_pass=true; c5_msg="Card and list components implemented"
          fi

          score=$(awk "BEGIN {printf \"%.2f\", $passed/$total}")
          echo "{\"score\":$score,\"details\":\"$passed/$total checks passed\",\"checks\":[{\"name\":\"component_file\",\"passed\":$c1_pass,\"message\":\"$c1_msg\"},{\"name\":\"template_file\",\"passed\":$c2_pass,\"message\":\"$c2_msg\"},{\"name\":\"tab_navigation\",\"passed\":$c3_pass,\"message\":\"$c3_msg\"},{\"name\":\"chart_component\",\"passed\":$c4_pass,\"message\":\"$c4_msg\"},{\"name\":\"card_list_components\",\"passed\":$c5_pass,\"message\":\"$c5_msg\"}]}"
        weight: 0.7
      - type: llm_rubric
        rubric: |
          Evaluate the dashboard implementation:
          
          1. **Layout and Navigation (30%)**:
             - Tab component properly configured with 3 tabs
             - Clean navigation structure
             - Proper tab content organization
          
          2. **Data Display Components (30%)**:
             - Card component with meaningful content
             - List component properly implemented
             - Progress indicator correctly used
          
          3. **Chart Integration (25%)**:
             - Chart component properly imported and configured
             - Sample data provided for the chart
             - Chart type appropriate for sales data display
          
          4. **Technical Implementation (15%)**:
             - Correct Ignite UI module imports
             - Proper Angular component structure
             - Clean TypeScript and HTML code
             - Follows Ignite UI best practices
        weight: 0.3
