<igx-buttongroup>
    <button igxButton (click)="clickHandler0()" selected>
        <strong>ROOT</strong>>
    </button>
    <button igxButton (click)="clickHandler1()">
        View 1
    </button>
    <button igxButton (click)="clickHandler2()">
        View 2
    </button>
    <button igxButton (click)="clickHandler3()">
        View 3
    </button>
</igx-buttongroup>

<section>
    <igx-tabs tabAlignment="center" (selectedItemChange)="selectedItemChanged($event)">
        <igx-tab-item
                routerLinkActive
                #rla1="routerLinkActive"
                [selected]="rla1.isActive"
        >
            <igx-tab-header
                    routerLink="/tabs-routing/view1"
            >
                <igx-icon igxTabHeaderIcon>folder</igx-icon>
                <span igxTabHeaderLabel>Tab 1</span>
            </igx-tab-header>
        </igx-tab-item>

        <igx-tab-item
                routerLinkActive
                #rla2="routerLinkActive"
                [selected]="rla2.isActive"
        >
            <igx-tab-header
                    routerLink="/tabs-routing/view2"
            >
                <igx-icon igxTabHeaderIcon>folder</igx-icon>
                <span igxTabHeaderLabel>Tab 2</span>
            </igx-tab-header>
        </igx-tab-item>

        <igx-tab-item
                routerLinkActive
                #rla3="routerLinkActive"
                [selected]="rla3.isActive"
        >
            <igx-tab-header
                    routerLink="/tabs-routing/view3"
            >
                <igx-icon igxTabHeaderIcon>folder</igx-icon>
                <span igxTabHeaderLabel>Tab 3</span>
            </igx-tab-header>
        </igx-tab-item>
    </igx-tabs>
    <router-outlet></router-outlet>
</section>
