version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    # Disables version updates; only Dependabot security updates are raised for npm dependencies.
    open-pull-requests-limit: 0
