# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI
permissions:
  contents: read

on:
  push:
    branches: [ master, '[0-9]+.[0-9]+.x' ]
  pull_request:
    branches: [ master, '[0-9]+.[0-9]+.x' ]

jobs:
  run-tests:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
            node-version: 24.x
            cache: 'npm'
      - name: Install packages
        run: npm ci
      - name: Lint Lib
        run: npm run lint:lib
        env:
            NODE_OPTIONS: --max_old_space_size=4096
      - name: Lint i18n
        run: npm run lint:i18n
      - name: Lint Extras
        run: npm run lint:extras
      - name: Build Lib
        run: npm run build:lib
      - name: Build Extras
        run: npm run build:extras
      - name: Build Schematics
        run: npm run build:schematics
      - name: Build Migrations
        run: npm run build:migrations
      - name: Build TypeDoc & SassDoc
        run: |
            npm run build:docs
      - name: Test
        run: |
            npm run test:lib
            npm run test:styles
            npm run test:schematics
            npm run test:i18n
            npm run test:extras
        env:
            NODE_OPTIONS: --max_old_space_size=4096 --no-experimental-strip-types
            TZ: America/New_York
      - name: Build i18n & validate output
        run: |
            npm run build:i18n
            npm run test:i18n:dist
      - name: Build Elements
        run: npm run elements:configure && npm run build:elements
      - name: Check for Elements config changes
        run: |
            if [ -n "$(git status --porcelain -- projects/igniteui-angular-elements/**/elements.config.ts)" ]; then
                echo "Error: There are changes to the Elements config. Run 'npm run elements:configure' and commit." >&2
                exit 1
            fi
      - name: Test Elements
        run: npm run test:elements
      - name: Build Demos
        run: npm run build
      - name: Bundle Tree-Shake & SSR Test
        run: npm run build:bundletest
      - name: Publish to coveralls.io
        uses: coverallsapp/github-action@v2
        with:
            github-token: ${{ github.token }}
